<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Télécharger Mon Application</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        img { width: 100px; height: 100px; border-radius: 20px; margin-bottom: 1rem; }
        h1 { color: #333; }
        p { color: #666; line-height: 1.5; }
        .btn { display: inline-block; background: #28a745; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 1rem; }
        .btn:hover { background: #218838; }
        .version { font-size: 0.8rem; color: #999; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://via.placeholder.com/100" alt="Logo App">
        <h1>Nom de votre App</h1>
        <p>Une description courte et géniale de ce que fait votre application Android.</p>
        
        <a href="BlindBuzz.apk" class="btn">Télécharger l'APK</a>
        
        <div class="version">Version 1.0.0 • Android 8.0+</div>
    </div>
</body>
</html>
